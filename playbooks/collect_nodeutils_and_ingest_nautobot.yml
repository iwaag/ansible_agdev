---
- name: Run nodeutils collection on inventory hosts
  ansible.builtin.import_playbook: run_nodeutils_collect.yml
  vars:
    target_hosts: "{{ nodeutils_target_hosts | default('linux:macos') }}"

- name: Read nodeutils reports for batch ingest
  hosts: "{{ nodeutils_target_hosts | default('linux:macos') }}"
  gather_facts: false

  vars:
    nodeutils_output_path: /var/lib/nodeutils/inventory.json

  tasks:
    - name: Read nodeutils inventory report
      ansible.builtin.slurp:
        src: "{{ nodeutils_output_path }}"
      register: nodeutils_report_slurp
      no_log: true

    - name: Record hosts included in the ingest batch
      ansible.builtin.set_fact:
        nodeutils_ingest_hosts: "{{ ansible_play_hosts_all }}"
      delegate_to: localhost
      delegate_facts: true
      run_once: true

- name: Run Nautobot nodeutils ingest job
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../vars/nautobot.yml

  vars:
    nautobot_ingest_job_name: "Ingest Nodeutils Inventory"
    nautobot_ingest_dry_run: true
    nautobot_ingest_policy_file: "seed/nodeutils_ingest.yaml"
    nautobot_ingest_max_report_age_hours: 72
    nautobot_ingest_max_report_bytes: 2097152

  tasks:
    - name: Assert Nautobot API settings are provided
      ansible.builtin.assert:
        that:
          - nautobot_url is defined
          - nautobot_url | length > 0
          - nautobot_token is defined
          - nautobot_token | length > 0
        fail_msg: >-
          Set nautobot_url and nautobot_token, for example from NAUTOBOT_URL/NAUTOBOT_TOKEN,
          extra vars, or Ansible Vault.

    - name: Initialize nodeutils report batch entries
      ansible.builtin.set_fact:
        nodeutils_report_entries: []
      no_log: true

    - name: Build nodeutils report batch entries
      ansible.builtin.set_fact:
        nodeutils_report_entries: >-
          {{
            (nodeutils_report_entries | default([]))
            + [
              {
                'source': item,
                'text': hostvars[item].nodeutils_report_slurp.content | b64decode,
              }
            ]
          }}
      loop: "{{ hostvars.localhost.nodeutils_ingest_hosts | default([]) }}"
      no_log: true

    - name: Assert nodeutils report batch is not empty
      ansible.builtin.assert:
        that:
          - nodeutils_report_entries is defined
          - nodeutils_report_entries | length > 0
        fail_msg: "No nodeutils reports were collected for Nautobot ingest."

    - name: Build nodeutils report batch payload
      ansible.builtin.set_fact:
        nodeutils_report_batch:
          reports: "{{ nodeutils_report_entries }}"
      no_log: true

    - name: Look up Nautobot ingest job
      ansible.builtin.uri:
        url: "{{ nautobot_url | regex_replace('/+$', '') }}/api/extras/jobs/?q={{ nautobot_ingest_job_name | urlencode }}"
        method: GET
        headers:
          Authorization: "Token {{ nautobot_token }}"
          Accept: application/json
        return_content: true
        validate_certs: "{{ nautobot_validate_certs }}"
        status_code: 200
      register: nautobot_job_lookup
      no_log: true

    - name: Select Nautobot ingest job
      ansible.builtin.set_fact:
        nautobot_ingest_job: >-
          {{
            (
              nautobot_job_lookup.json.results
              | selectattr('name', 'equalto', nautobot_ingest_job_name)
              | list
            )[0]
          }}
      when: >-
        (
          nautobot_job_lookup.json.results
          | selectattr('name', 'equalto', nautobot_ingest_job_name)
          | list
          | length
        ) > 0

    - name: Assert Nautobot ingest job exists
      ansible.builtin.assert:
        that:
          - nautobot_ingest_job is defined
          - nautobot_ingest_job.id is defined
        fail_msg: >-
          Could not find Nautobot Job named "{{ nautobot_ingest_job_name }}".
          Sync the nauto Git Repository in Nautobot and enable the Job first.

    - name: Run Nautobot ingest job
      ansible.builtin.uri:
        url: "{{ nautobot_url | regex_replace('/+$', '') }}/api/extras/jobs/{{ nautobot_ingest_job.id }}/run/"
        method: POST
        headers:
          Authorization: "Token {{ nautobot_token }}"
          Accept: application/json
          Content-Type: application/json
        body: >-
          {{
            {
              'data': {
                'report_batch': nodeutils_report_batch | to_json,
                'policy_file': nautobot_ingest_policy_file,
                'dry_run': nautobot_ingest_dry_run | bool,
                'max_report_age_hours': nautobot_ingest_max_report_age_hours | int,
                'max_report_bytes': nautobot_ingest_max_report_bytes | int,
              },
              'commit': true,
            } | to_json
          }}
        return_content: true
        validate_certs: "{{ nautobot_validate_certs }}"
        status_code:
          - 200
          - 201
          - 202
      register: nautobot_ingest_run
      no_log: true

    - name: Show Nautobot ingest job result
      ansible.builtin.debug:
        msg:
          job_name: "{{ nautobot_ingest_job.name }}"
          job_id: "{{ nautobot_ingest_job.id }}"
          dry_run: "{{ nautobot_ingest_dry_run | bool }}"
          report_count: "{{ nodeutils_report_entries | length }}"
          response_status: "{{ nautobot_ingest_run.status }}"
          response_location: "{{ nautobot_ingest_run.location | default('') }}"
