---
# Shared transport: download one JobResult FileProxy artifact.
#
# Inputs (pass via the including task's vars):
#   download_job_result_id - JobResult id whose file proxy to fetch
#   download_filename      - exact created file name (e.g. hosts_intent.yml)
#   download_file_regex    - regex the matching file proxy payload must contain
# Requires: nautobot_url, nautobot_token, nautobot_validate_certs
# Output (set_fact): nautobot_download_content

- name: "Reset shared download facts for {{ download_filename }}"
  ansible.builtin.set_fact:
    nautobot_file_proxy: null
    nautobot_download_content: ""

- name: "Look up {{ download_filename }} file proxy"
  ansible.builtin.uri:
    url: "{{ nautobot_url | regex_replace('/+$', '') }}/api/extras/file-proxies/?job_result_id={{ download_job_result_id | urlencode }}&name={{ download_filename | urlencode }}"
    method: GET
    headers:
      Authorization: "Token {{ nautobot_token }}"
      Accept: application/json
    return_content: true
    validate_certs: "{{ nautobot_validate_certs }}"
    status_code: 200
  register: nautobot_file_proxy_lookup
  no_log: true

- name: "Select {{ download_filename }} file proxy"
  ansible.builtin.set_fact:
    nautobot_file_proxy: "{{ item }}"
  loop: "{{ nautobot_file_proxy_lookup.json.results | default([]) }}"
  when:
    - nautobot_file_proxy is none
    - item | to_json is search(download_job_result_id)
    - item | to_json is search(download_file_regex)
  no_log: true

- name: "Assert {{ download_filename }} file proxy exists"
  ansible.builtin.assert:
    that:
      - nautobot_file_proxy is not none
      - nautobot_file_proxy.id is defined or nautobot_file_proxy.pk is defined
    fail_msg: >-
      Could not find JobResult file matching "{{ download_filename }}"
      for JobResult "{{ download_job_result_id }}".
      Confirm the Nautobot token can view extras file proxies.

- name: "Set {{ download_filename }} file proxy id"
  ansible.builtin.set_fact:
    nautobot_file_proxy_id: "{{ nautobot_file_proxy.id | default(nautobot_file_proxy.pk) }}"

- name: "Download {{ download_filename }}"
  ansible.builtin.uri:
    url: "{{ nautobot_url | regex_replace('/+$', '') }}/api/extras/file-proxies/{{ nautobot_file_proxy_id }}/download/"
    method: GET
    headers:
      Authorization: "Token {{ nautobot_token }}"
      Accept: "*/*"
    return_content: true
    validate_certs: "{{ nautobot_validate_certs }}"
    status_code: 200
  register: nautobot_download
  no_log: true

- name: "Capture {{ download_filename }} content"
  ansible.builtin.set_fact:
    nautobot_download_content: "{{ nautobot_download.content }}"
