---
# Shared transport: run a Nautobot Job and wait for its JobResult to finish.
#
# Inputs (pass via the including task's vars):
#   job_name        - exact Nautobot Job display name
#   job_data        - mapping of Job input variables
# Optional inputs:
#   nautobot_job_poll_retries (default 30), nautobot_job_poll_delay (default 2)
# Requires: nautobot_url, nautobot_token, nautobot_validate_certs
# Output (set_fact): nautobot_job_result_id

- name: "Reset shared Nautobot job facts for {{ job_name }}"
  ansible.builtin.set_fact:
    nautobot_job: null
    nautobot_job_result_id: ""

- name: "Look up Nautobot job {{ job_name }}"
  ansible.builtin.uri:
    url: "{{ nautobot_url | regex_replace('/+$', '') }}/api/extras/jobs/?q={{ job_name | urlencode }}"
    method: GET
    headers:
      Authorization: "Token {{ nautobot_token }}"
      Accept: application/json
    return_content: true
    validate_certs: "{{ nautobot_validate_certs }}"
    status_code: 200
  register: nautobot_job_lookup
  no_log: true

- name: "Select Nautobot job {{ job_name }}"
  ansible.builtin.set_fact:
    nautobot_job: >-
      {{
        (
          nautobot_job_lookup.json.results
          | selectattr('name', 'equalto', job_name)
          | list
        )[0]
      }}
  when: >-
    (
      nautobot_job_lookup.json.results
      | selectattr('name', 'equalto', job_name)
      | list
      | length
    ) > 0

- name: "Assert Nautobot job {{ job_name }} exists"
  ansible.builtin.assert:
    that:
      - nautobot_job is defined
      - nautobot_job is not none
      - nautobot_job.id is defined
    fail_msg: >-
      Could not find Nautobot Job named "{{ job_name }}".
      Confirm nintent is installed, jobs are registered, and the Job is enabled.

- name: "Run Nautobot job {{ job_name }}"
  ansible.builtin.uri:
    url: "{{ nautobot_url | regex_replace('/+$', '') }}/api/extras/jobs/{{ nautobot_job.id }}/run/"
    method: POST
    headers:
      Authorization: "Token {{ nautobot_token }}"
      Accept: application/json
      Content-Type: application/json
    body: >-
      {{ {'data': job_data, 'commit': true} | to_json }}
    return_content: true
    validate_certs: "{{ nautobot_validate_certs }}"
    status_code:
      - 200
      - 201
      - 202
  register: nautobot_job_run
  no_log: true

- name: "Determine {{ job_name }} JobResult id from response body"
  ansible.builtin.set_fact:
    nautobot_job_result_url: >-
      {{
        nautobot_job_run.location
        | default(nautobot_job_run.json.job_result.url | default(nautobot_job_run.json.result.url | default(nautobot_job_run.json.url | default(''))))
      }}
    nautobot_job_result_id_from_body: >-
      {{
        nautobot_job_run.json.job_result.id
        | default(nautobot_job_run.json.job_result.pk | default(nautobot_job_run.json.result.id | default(nautobot_job_run.json.job_result | default(nautobot_job_run.json.id | default('')))))
      }}

- name: "Determine {{ job_name }} JobResult id from URL"
  ansible.builtin.set_fact:
    nautobot_job_result_id_from_url: >-
      {{
        nautobot_job_result_url
        | regex_replace('^.*/api/extras/job-results/([^/]+)/?.*$', '\1')
      }}
  when: nautobot_job_result_url is search('/api/extras/job-results/')

- name: "Set {{ job_name }} JobResult id"
  ansible.builtin.set_fact:
    nautobot_job_result_id: >-
      {{
        nautobot_job_result_id_from_body
        if nautobot_job_result_id_from_body | length > 0
        else nautobot_job_result_id_from_url | default('')
      }}

- name: "Assert {{ job_name }} JobResult id was found"
  ansible.builtin.assert:
    that:
      - nautobot_job_result_id | length > 0
    fail_msg: Could not determine JobResult id from Nautobot Job run response.

- name: "Normalize {{ job_name }} JobResult id"
  ansible.builtin.set_fact:
    nautobot_job_result_id: >-
      {{
        nautobot_job_result_id
        | regex_replace('^.*/api/extras/job-results/([^/]+)/?.*$', '\1')
      }}
  when: nautobot_job_result_id is search('/api/extras/job-results/')

- name: "Wait for {{ job_name }} to finish"
  ansible.builtin.uri:
    url: "{{ nautobot_url | regex_replace('/+$', '') }}/api/extras/job-results/{{ nautobot_job_result_id }}/"
    method: GET
    headers:
      Authorization: "Token {{ nautobot_token }}"
      Accept: application/json
    return_content: true
    validate_certs: "{{ nautobot_validate_certs }}"
    status_code: 200
  register: nautobot_job_result
  until: >-
    (
      nautobot_job_result.json.status.value | default(nautobot_job_result.json.status) | string | lower
    ) in ['completed', 'success', 'successful', 'failed', 'failure', 'errored', 'error', 'revoked', 'canceled', 'cancelled']
  retries: "{{ nautobot_job_poll_retries | default(30) }}"
  delay: "{{ nautobot_job_poll_delay | default(2) }}"
  no_log: true

- name: "Assert {{ job_name }} succeeded"
  ansible.builtin.assert:
    that:
      - >-
        (
          nautobot_job_result.json.status.value | default(nautobot_job_result.json.status) | string | lower
        ) in ['completed', 'success', 'successful']
    fail_msg: Nautobot Job "{{ job_name }}" did not succeed.
