---
# Shared: serialize the audited deployment_profiles mapping into the production
# Job-input canonical JSON byte contract and its SHA-256 digest, so the production
# export and the projection sync push byte-identical inputs to Nautobot.
#
# Requires: deployment_profiles (from vars/deployment_profiles.yml)
# Output (set_fact):
#   nintent_deployment_profiles_json   - canonical JSON payload
#   nintent_deployment_profiles_digest - SHA-256 hex digest of the payload

- name: Assert deployment profiles are a non-empty mapping
  ansible.builtin.assert:
    that:
      - deployment_profiles is mapping
      - deployment_profiles | length > 0
    fail_msg: vars/deployment_profiles.yml must define a non-empty deployment_profiles mapping.

- name: Serialize the audited deployment profiles to canonical JSON
  ansible.builtin.set_fact:
    nintent_deployment_profiles_json: >-
      {{
        deployment_profiles
        | to_json(sort_keys=true, separators=[',', ':'], ensure_ascii=false, allow_nan=false)
      }}

- name: Compute the deployment profile SHA-256 digest
  ansible.builtin.set_fact:
    nintent_deployment_profiles_digest: "{{ nintent_deployment_profiles_json | hash('sha256') }}"
