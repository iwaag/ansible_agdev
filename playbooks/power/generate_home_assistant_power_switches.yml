---
- name: Generate Home Assistant power switches from inventory
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    ansible_connection: local
    ansible_host: 127.0.0.1
    home_assistant_power_output_path: "{{ playbook_dir | dirname }}/generated/home_assistant/ansible_power_switches.yaml"
    home_assistant_webhook_base_url: "http://127.0.0.1:8000"
    home_assistant_webhook_token: "CHANGE_ME"
    home_assistant_ping_count: 1
    home_assistant_ping_timeout_seconds: 1

  tasks:
    - name: Build the list of power-managed hosts
      ansible.builtin.set_fact:
        home_assistant_power_hosts: "{{ groups.get('power_managed', []) | unique }}"

    - name: Build the list of Linux power-managed hosts
      ansible.builtin.set_fact:
        home_assistant_linux_power_hosts: "{{ home_assistant_power_hosts | intersect(groups.get('linux', [])) }}"

    - name: Assert the webhook base URL looks valid
      ansible.builtin.assert:
        that:
          - home_assistant_webhook_base_url is match("^https?://")
        fail_msg: "home_assistant_webhook_base_url must start with http:// or https://"

    - name: Assert at least one power-managed host was found
      ansible.builtin.assert:
        that:
          - home_assistant_power_hosts | length > 0
        fail_msg: "No hosts were found in the power_managed group."

    - name: Assert supported hosts define a local state target
      ansible.builtin.assert:
        that:
          - >-
            (
              hostvars[item].local_ip
              | default(hostvars[item].local_dns_hostname | default(hostvars[item].mdns_hostname | default('', true), true), true)
              | length
            ) > 0
        fail_msg: >-
          Host {{ item }} must define local_ip, local_dns_hostname, or mdns_hostname
          to generate a Home Assistant power switch.
      loop: "{{ home_assistant_power_hosts }}"

    - name: Assert Linux power-managed hosts define mac_address
      ansible.builtin.assert:
        that:
          - hostvars[item].mac_address is defined
          - hostvars[item].mac_address | length > 0
        fail_msg: >-
          Linux host {{ item }} must define mac_address to generate a Home Assistant power switch.
      loop: "{{ home_assistant_linux_power_hosts }}"

    - name: Assert supported hosts belong to exactly one power control family
      ansible.builtin.assert:
        that:
          - hostvars[item].host_os is defined
          - hostvars[item].host_os in ['linux', 'macos']
          - hostvars[item].power_control is defined
          - (hostvars[item].host_os == 'linux' and hostvars[item].power_control == 'wol') or
            (hostvars[item].host_os == 'macos' and hostvars[item].power_control == 'macos_sleep')
        fail_msg: "Host {{ item }} must define a supported host_os/power_control combination."
      loop: "{{ home_assistant_power_hosts }}"

    - name: Ensure the generated Home Assistant directory exists
      ansible.builtin.file:
        path: "{{ home_assistant_power_output_path | dirname }}"
        state: directory
        mode: "0755"

    - name: Render Home Assistant command_line switches
      ansible.builtin.template:
        src: ../templates/home-assistant-power-switches.yaml.j2
        dest: "{{ home_assistant_power_output_path }}"
        mode: "0640"
