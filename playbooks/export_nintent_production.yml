---
- name: Export nintent production inventory from Nautobot
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../vars/nautobot.yml
    - ../vars/deployment_profiles.yml

  vars:
    nintent_production_job_name: "Export Production Inventory"
    nintent_production_local_dir: "{{ playbook_dir }}/../inventories/generated"
    nintent_production_local_file: "{{ nintent_production_local_dir }}/production.yml"
    nintent_production_staging_file: "{{ nintent_production_local_dir }}/.production.yml.staging"
    nintent_production_reports_dir: "{{ nintent_production_local_dir }}/production.reports"
    nintent_production_inventory_filename: production.yml
    nintent_production_inventory_file_regex: 'production(_[A-Za-z0-9]+)?\.yml'
    nintent_production_expected_schema_version: "1.0"
    nautobot_job_poll_retries: 30
    nautobot_job_poll_delay: 2

  tasks:
    - name: Assert Nautobot API settings are provided
      ansible.builtin.assert:
        that:
          - nautobot_url is defined
          - nautobot_url | length > 0
          - nautobot_token is defined
          - nautobot_token | length > 0
        fail_msg: >-
          Set nautobot_url and nautobot_token, for example from NAUTOBOT_URL/NAUTOBOT_TOKEN,
          extra vars, or Ansible Vault.

    - name: Ensure generated inventory and report directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0700"
      loop:
        - "{{ nintent_production_local_dir }}"
        - "{{ nintent_production_reports_dir }}"

    - name: Serialize the audited deployment profiles to canonical JSON
      ansible.builtin.set_fact:
        nintent_deployment_profiles_json: >-
          {{
            deployment_profiles
            | to_json(sort_keys=true, separators=[',', ':'], ensure_ascii=false, allow_nan=false)
          }}

    - name: Assert deployment profiles are a non-empty mapping
      ansible.builtin.assert:
        that:
          - deployment_profiles is mapping
          - deployment_profiles | length > 0
        fail_msg: vars/deployment_profiles.yml must define a non-empty deployment_profiles mapping.

    - name: Compute the deployment profile SHA-256 digest
      ansible.builtin.set_fact:
        nintent_deployment_profiles_digest: "{{ nintent_deployment_profiles_json | hash('sha256') }}"

    - name: Run the production inventory export Job
      ansible.builtin.include_tasks: tasks/nautobot_run_job.yml
      vars:
        job_name: "{{ nintent_production_job_name }}"
        job_data:
          deployment_profiles_json: "{{ nintent_deployment_profiles_json }}"
          deployment_profiles_digest: "{{ nintent_deployment_profiles_digest }}"

    - name: Download the production inventory artifact
      ansible.builtin.include_tasks: tasks/nautobot_download_file.yml
      vars:
        download_job_result_id: "{{ nautobot_job_result_id }}"
        download_filename: "{{ nintent_production_inventory_filename }}"
        download_file_regex: "{{ nintent_production_inventory_file_regex }}"

    - name: Capture the downloaded production inventory
      ansible.builtin.set_fact:
        nintent_production_inventory_content: "{{ nautobot_download_content }}"
        nintent_production_metadata: "{{ (nautobot_download_content | from_yaml).all.vars }}"

    - name: Determine the production generation id
      ansible.builtin.set_fact:
        nintent_production_generation_id: "{{ nintent_production_metadata.nintent_generation_id }}"

    - name: Assert the production inventory matches the requested schema and profile digest
      ansible.builtin.assert:
        that:
          - nintent_production_metadata.nintent_inventory_schema_version == nintent_production_expected_schema_version
          - nintent_production_metadata.nintent_deployment_profile_digest == nintent_deployment_profiles_digest
          - >-
            nintent_production_metadata.nintent_report_path
            == 'production.reports/' ~ nintent_production_generation_id ~ '.json'
        fail_msg: >-
          The downloaded production inventory schema, profile digest, or report path does not
          match this export request.

    - name: Download the immutable generation-addressed report
      ansible.builtin.include_tasks: tasks/nautobot_download_file.yml
      vars:
        download_job_result_id: "{{ nautobot_job_result_id }}"
        download_filename: "{{ nintent_production_generation_id }}.json"
        download_file_regex: "{{ nintent_production_generation_id }}"

    - name: Capture and parse the downloaded report
      ansible.builtin.set_fact:
        nintent_production_report_content: "{{ nautobot_download_content }}"
        nintent_production_report: "{{ nautobot_download_content | from_json }}"

    - name: Assert the report shares the inventory generation id, digest, and schema
      ansible.builtin.assert:
        that:
          - nintent_production_report.schema_version == nintent_production_expected_schema_version
          - nintent_production_report.generation_id == nintent_production_generation_id
          - nintent_production_report.deployment_profile_digest == nintent_deployment_profiles_digest
        fail_msg: >-
          The production inventory and its report do not share a matching generation id,
          deployment profile digest, and schema version.

    - name: Install validated production inventory and report atomically
      block:
        - name: Write the staged production inventory
          ansible.builtin.copy:
            content: "{{ nintent_production_inventory_content }}"
            dest: "{{ nintent_production_staging_file }}"
            mode: "0600"

        - name: Validate the staged production inventory
          ansible.builtin.command:
            argv:
              - ansible-inventory
              - -i
              - "{{ nintent_production_staging_file }}"
              - --list
          changed_when: false

        - name: Install the immutable generation-addressed report
          ansible.builtin.copy:
            content: "{{ nintent_production_report_content }}"
            dest: "{{ nintent_production_reports_dir }}/{{ nintent_production_generation_id }}.json"
            mode: "0600"
            force: false

        - name: Atomically replace the local production inventory
          ansible.builtin.command:
            argv:
              - mv
              - "{{ nintent_production_staging_file }}"
              - "{{ nintent_production_local_file }}"
          changed_when: true
      rescue:
        - name: Remove the unvalidated staged production inventory
          ansible.builtin.file:
            path: "{{ nintent_production_staging_file }}"
            state: absent

        - name: Fail because the production inventory was not installed
          ansible.builtin.fail:
            msg: >-
              The downloaded production inventory failed validation and was not installed.
              The previous {{ nintent_production_local_file }} is unchanged.

    - name: Show production inventory export result
      ansible.builtin.debug:
        msg:
          job_name: "{{ nintent_production_job_name }}"
          job_result_id: "{{ nautobot_job_result_id }}"
          schema_version: "{{ nintent_production_expected_schema_version }}"
          generation_id: "{{ nintent_production_generation_id }}"
          local_inventory: "{{ nintent_production_local_file }}"
          report: "{{ nintent_production_reports_dir }}/{{ nintent_production_generation_id }}.json"
          summary: "{{ nintent_production_report.summary }}"
