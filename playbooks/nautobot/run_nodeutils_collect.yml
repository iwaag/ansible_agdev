---
- name: Clone nodeutils and collect local inventory
  hosts: "{{ target_hosts | default('ssh_hosts') }}"
  become: true
  gather_facts: true

  vars:
    nodeutils_repo: "https://github.com/iwaag/nodeutils.git"
    nodeutils_version: "HEAD"
    nodeutils_user: "{{ ansible_user | default(default_user) }}"
    nodeutils_home: "{{ '/Users/' ~ nodeutils_user if ansible_system == 'Darwin' else '/home/' ~ nodeutils_user }}"
    nodeutils_checkout_dir: /opt/nodeutils
    nodeutils_state_dir: /var/lib/nodeutils
    nodeutils_output_path: "{{ nodeutils_state_dir }}/inventory.json"
    nodeutils_probe_config_dir: ""
    nodeutils_probe_config_path: "{{ nodeutils_state_dir }}/nctl-probe-config.yaml"
    nodeutils_collect_args: >-
      --format json --output {{ nodeutils_output_path }}
      {{ ('--config ' ~ nodeutils_probe_config_path) if (nodeutils_probe_config_dir | length > 0) else '' }}
    nodeutils_uv_path: "{{ '/opt/homebrew/bin/uv' if ansible_system == 'Darwin' else '/usr/local/bin/uv' }}"
    nodeutils_extra_path: /usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
    nodeutils_linux_packages:
      - pciutils

  pre_tasks:
    - name: Install Git on Linux hosts
      ansible.builtin.import_role:
        name: git_client
      when: ansible_system == "Linux"

    - name: Install optional nodeutils Linux collection packages
      ansible.builtin.package:
        name: "{{ nodeutils_linux_packages }}"
        state: present
      when: ansible_system == "Linux"

  roles:
    - role: uv
    - role: nodeutils_pvesh_helper

  tasks:
    - name: Ensure nodeutils checkout directory exists
      ansible.builtin.file:
        path: "{{ nodeutils_checkout_dir }}"
        state: directory
        owner: "{{ nodeutils_user }}"
        mode: "0755"
        recurse: true

    - name: Ensure nodeutils state directory exists
      ansible.builtin.file:
        path: "{{ nodeutils_state_dir }}"
        state: directory
        owner: "{{ nodeutils_user }}"
        mode: "0700"

    - name: Clone or update nodeutils repository
      ansible.builtin.git:
        repo: "{{ nodeutils_repo }}"
        dest: "{{ nodeutils_checkout_dir }}"
        version: "{{ nodeutils_version }}"
        update: true
        force: true
      become: true
      become_user: "{{ nodeutils_user }}"
      environment:
        HOME: "{{ nodeutils_home }}"
        PATH: "{{ nodeutils_extra_path }}"

    - name: Install nctl-generated service probe configuration
      ansible.builtin.copy:
        src: "{{ nodeutils_probe_config_dir }}/{{ inventory_hostname }}.yaml"
        dest: "{{ nodeutils_probe_config_path }}"
        owner: "{{ nodeutils_user }}"
        mode: "0600"
      when: nodeutils_probe_config_dir | length > 0

    - name: Sync nodeutils dependencies with uv
      ansible.builtin.command:
        cmd: "{{ nodeutils_uv_path }} sync --frozen"
        chdir: "{{ nodeutils_checkout_dir }}"
      become: true
      become_user: "{{ nodeutils_user }}"
      environment:
        HOME: "{{ nodeutils_home }}"
        PATH: "{{ nodeutils_extra_path }}"
      changed_when: false

    - name: Run nodeutils inventory collection
      ansible.builtin.command:
        cmd: "{{ nodeutils_uv_path }} run nodeutils collect {{ nodeutils_collect_args }}"
        chdir: "{{ nodeutils_checkout_dir }}"
      become: true
      become_user: "{{ nodeutils_user }}"
      environment:
        HOME: "{{ nodeutils_home }}"
        PATH: "{{ nodeutils_extra_path }}"
      changed_when: true

    - name: Stat the nodeutils checkout and state directories after collection
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - "{{ nodeutils_checkout_dir }}"
        - "{{ nodeutils_state_dir }}"
      register: nodeutils_post_collection_dir_stats

    - name: Fail if collection left a root-owned nodeutils directory
      ansible.builtin.assert:
        that:
          - item.stat.exists
          - item.stat.pw_name == nodeutils_user
        fail_msg: >-
          {{ item.item }} must remain owned by {{ nodeutils_user }} after collection; a root-owned
          path indicates the pvesh privilege boundary leaked into the non-root collector.
      loop: "{{ nodeutils_post_collection_dir_stats.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Stat the collected nodeutils report
      ansible.builtin.stat:
        path: "{{ nodeutils_output_path }}"
      register: nodeutils_report_stat

    - name: Fail if the report was not produced by the non-root collector
      ansible.builtin.assert:
        that:
          - nodeutils_report_stat.stat.exists
          - nodeutils_report_stat.stat.pw_name == nodeutils_user
        fail_msg: "{{ nodeutils_output_path }} must exist and be owned by {{ nodeutils_user }}."

    - name: Fail if a Proxmox host produced a wrongly-moded report
      ansible.builtin.assert:
        that:
          - nodeutils_report_stat.stat.mode == "0600"
        fail_msg: "{{ nodeutils_output_path }} must be mode 0600 after Proxmox collection."
      when: nodeutils_pvesh_bin_stat.stat.exists
