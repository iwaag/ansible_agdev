---
- name: Export nintent hosts intent inventory from Nautobot
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../vars/nautobot.yml

  vars:
    nintent_hosts_intent_job_name: "Export Ansible Hosts Intent"
    nintent_hosts_intent_include_skipped: true
    nintent_hosts_intent_local_dir: "{{ playbook_dir }}/../inventories/generated"
    nintent_hosts_intent_local_file: "{{ nintent_hosts_intent_local_dir }}/hosts_intent.yml"
    nintent_hosts_intent_staging_file: "{{ nintent_hosts_intent_local_dir }}/.hosts_intent.yml.staging"
    nintent_hosts_intent_export_filename: hosts_intent.yml
    nintent_hosts_intent_export_file_regex: 'hosts_intent(_[A-Za-z0-9]+)?\.yml'
    nintent_hosts_intent_expected_schema_version: "2.0"
    nautobot_job_poll_retries: 30
    nautobot_job_poll_delay: 2

  tasks:
    - name: Assert Nautobot API settings are provided
      ansible.builtin.assert:
        that:
          - nautobot_url is defined
          - nautobot_url | length > 0
          - nautobot_token is defined
          - nautobot_token | length > 0
        fail_msg: >-
          Set nautobot_url and nautobot_token, for example from NAUTOBOT_URL/NAUTOBOT_TOKEN,
          extra vars, or Ansible Vault.

    - name: Ensure generated inventory directory exists
      ansible.builtin.file:
        path: "{{ nintent_hosts_intent_local_dir }}"
        state: directory
        mode: "0700"

    - name: Run the hosts intent export Job
      ansible.builtin.include_tasks: ../tasks/nautobot_run_job.yml
      vars:
        job_name: "{{ nintent_hosts_intent_job_name }}"
        job_data:
          include_skipped: "{{ nintent_hosts_intent_include_skipped | bool }}"

    - name: Download the hosts intent inventory artifact
      ansible.builtin.include_tasks: ../tasks/nautobot_download_file.yml
      vars:
        download_job_result_id: "{{ nautobot_job_result_id }}"
        download_filename: "{{ nintent_hosts_intent_export_filename }}"
        download_file_regex: "{{ nintent_hosts_intent_export_file_regex }}"

    - name: Assert Nautobot hosts intent export schema is supported
      ansible.builtin.assert:
        that:
          - >-
            nautobot_download_content
            is search('# schema_version: ' ~ nintent_hosts_intent_expected_schema_version)
        fail_msg: >-
          The downloaded nintent hosts intent export is not schema
          {{ nintent_hosts_intent_expected_schema_version }}.

    - name: Install validated nintent hosts intent inventory atomically
      block:
        - name: Write staged nintent hosts intent inventory
          ansible.builtin.copy:
            content: "{{ nautobot_download_content }}"
            dest: "{{ nintent_hosts_intent_staging_file }}"
            mode: "0600"

        - name: Validate staged nintent hosts intent inventory
          ansible.builtin.command:
            argv:
              - ansible-inventory
              - -i
              - "{{ nintent_hosts_intent_staging_file }}"
              - --list
          changed_when: false

        - name: Atomically replace local nintent hosts intent inventory
          ansible.builtin.command:
            argv:
              - mv
              - "{{ nintent_hosts_intent_staging_file }}"
              - "{{ nintent_hosts_intent_local_file }}"
          changed_when: true
      rescue:
        - name: Remove unvalidated staged nintent hosts intent inventory
          ansible.builtin.file:
            path: "{{ nintent_hosts_intent_staging_file }}"
            state: absent

        - name: Fail because the downloaded inventory was not installed
          ansible.builtin.fail:
            msg: >-
              The downloaded nintent hosts intent inventory failed validation and was
              not installed. The previous {{ nintent_hosts_intent_local_file }} is unchanged.

    - name: Show nintent hosts intent export result
      ansible.builtin.debug:
        msg:
          job_name: "{{ nintent_hosts_intent_job_name }}"
          job_result_id: "{{ nautobot_job_result_id }}"
          schema_version: "{{ nintent_hosts_intent_expected_schema_version }}"
          local_inventory: "{{ nintent_hosts_intent_local_file }}"
