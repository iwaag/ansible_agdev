---
- name: Sync the nintent deployment_profiles projection into Nautobot
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../vars/nautobot.yml
    - ../vars/deployment_profiles.yml

  vars:
    nintent_sync_profiles_job_name: "Sync Deployment Profiles"
    nautobot_job_poll_retries: 30
    nautobot_job_poll_delay: 2

  tasks:
    - name: Assert Nautobot API settings are provided
      ansible.builtin.assert:
        that:
          - nautobot_url is defined
          - nautobot_url | length > 0
          - nautobot_token is defined
          - nautobot_token | length > 0
        fail_msg: >-
          Set nautobot_url and nautobot_token, for example from NAUTOBOT_URL/NAUTOBOT_TOKEN,
          extra vars, or Ansible Vault.

    - name: Serialize and digest the audited deployment profiles
      ansible.builtin.include_tasks: ../tasks/nintent_serialize_deployment_profiles.yml

    - name: Run the deployment profiles sync Job
      ansible.builtin.include_tasks: ../tasks/nautobot_run_job.yml
      vars:
        job_name: "{{ nintent_sync_profiles_job_name }}"
        job_data:
          deployment_profiles_json: "{{ nintent_deployment_profiles_json }}"
          deployment_profiles_digest: "{{ nintent_deployment_profiles_digest }}"

    - name: Show deployment profiles sync result
      ansible.builtin.debug:
        msg:
          job_name: "{{ nintent_sync_profiles_job_name }}"
          job_result_id: "{{ nautobot_job_result_id }}"
          deployment_profile_digest: "{{ nintent_deployment_profiles_digest }}"
          profiles: "{{ deployment_profiles | length }}"
