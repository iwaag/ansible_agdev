---
- name: Schedule macOS hosts to wake shortly
  hosts: mac_llm:mac_infra
  gather_facts: false
  become: false

  vars:
    macos_wake_delay_seconds: 2

  tasks:
    - name: Schedule the host to wake
      ansible.builtin.shell: >
        sudo -n /usr/bin/pmset schedule wake
        "$(/bin/date -v+{{ macos_wake_delay_seconds }}S '+%m/%d/%y %H:%M:%S')"
      args:
        executable: /bin/bash
      changed_when: true
