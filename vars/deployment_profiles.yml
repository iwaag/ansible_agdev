---
# Ansible-owned production inventory projection contract.
# This file must not contain secrets. Profile and config keys are lowercase
# slugs; config schema 1 accepts only the explicitly declared JSON types.
deployment_profiles:
  dnsmasq:
    group: dnsmasq_server
    config_schema_version: "1"
    variables:
      bind_interfaces:
        ansible_variable: dnsmasq_bind_interfaces
        type: boolean
        required: false
      cache_size:
        ansible_variable: dnsmasq_cache_size
        type: integer
        required: false
      dhcp_authoritative:
        ansible_variable: dnsmasq_dhcp_authoritative
        type: boolean
        required: false
      enable_dhcp:
        ansible_variable: dnsmasq_enable_dhcp
        type: boolean
        required: false
      interfaces:
        ansible_variable: dnsmasq_interfaces
        type: list
        items: string
        required: false
      listen_addresses:
        ansible_variable: dnsmasq_listen_addresses
        type: list
        items: string
        required: false
      local_domain:
        ansible_variable: dnsmasq_local_domain
        type: string
        required: false
      upstream_servers:
        ansible_variable: dnsmasq_upstream_servers
        type: list
        items: string
        required: false

  grafana:
    group: grafana_server
    config_schema_version: "1"
    variables:
      datasource_is_default:
        ansible_variable: grafana_datasource_is_default
        type: boolean
        required: false
      datasource_name:
        ansible_variable: grafana_datasource_name
        type: string
        required: false
      datasource_provisioning_enabled:
        ansible_variable: grafana_datasource_provisioning_enabled
        type: boolean
        required: false
      prometheus_port:
        ansible_variable: grafana_prometheus_port
        type: integer
        required: false
      prometheus_scheme:
        ansible_variable: grafana_prometheus_scheme
        type: string
        required: false

  home_assistant:
    group: haos_server
    config_schema_version: "1"
    variables: {}

  nomad_client:
    group: nomad_client
    config_schema_version: "1"
    variables:
      datacenter:
        ansible_variable: nomad_datacenter
        type: string
        required: false
      node_class:
        ansible_variable: nomad_client_node_class
        type: string
        required: false
      raw_exec_enabled:
        ansible_variable: nomad_raw_exec_enabled
        type: boolean
        required: false
      region:
        ansible_variable: nomad_region
        type: string
        required: false

  nomad_server:
    group: nomad_server
    config_schema_version: "1"
    variables:
      bootstrap_expect:
        ansible_variable: nomad_bootstrap_expect
        type: integer
        required: false
      datacenter:
        ansible_variable: nomad_datacenter
        type: string
        required: false
      region:
        ansible_variable: nomad_region
        type: string
        required: false
      retry_join:
        ansible_variable: nomad_server_retry_join
        type: list
        items: string
        required: false

  prometheus:
    group: prometheus_server
    config_schema_version: "1"
    variables:
      listen_address:
        ansible_variable: prometheus_listen_address
        type: string
        required: false
      retention_time:
        ansible_variable: prometheus_retention_time
        type: string
        required: false

  prometheus_node_exporter:
    group: prometheus_node_exporter_targets
    config_schema_version: "1"
    variables: {}

# Phase 4 Step 5 (nctl reconcile planner): which profiles have a registered
# reconciliation action, what kind it is, and their actuation order. This is
# a separate top-level key from deployment_profiles on purpose -- it must
# never perturb that key's closed production-inventory contract/digest. A
# profile absent here, or present with neither `action` nor `observe_only`,
# is `unsupported`: nctl never invents a playbook for it.
deployment_profile_reconciliation:
  dnsmasq:
    action:
      kind: dnsmasq_config

  grafana:
    action:
      kind: playbook
      playbook: playbooks/monitoring/setup_grafana.yml
    dependencies:
      - prometheus

  home_assistant:
    # Declared/HAOS nodes are actual-state-exempt (Phase 2 Step 3); nothing
    # here to actuate from nodeutils-observed drift.
    observe_only: true

  nomad_client:
    action:
      kind: playbook
      playbook_by_os:
        linux: playbooks/nomad/setup_nomad_client.yml
        macos: playbooks/nomad/setup_nomad_client_macos.yml
    dependencies:
      - nomad_server

  nomad_server:
    action:
      kind: playbook
      playbook: playbooks/nomad/setup_nomad_server.yml

  prometheus:
    action:
      kind: playbook
      playbook: playbooks/monitoring/setup_prometheus.yml

  prometheus_node_exporter:
    action:
      kind: playbook
      playbook: playbooks/monitoring/setup_node_exporter.yml
    dependencies:
      - prometheus
