[defaults]
# Production execution defaults to the generated production inventory. The
# nctl generates both inventories. The bootstrap/collection stage explicitly
# selects ./inventories/generated/hosts_intent.yml (see the Makefile), so the
# two stages never share an ambiguous default.
inventory = ./inventories/generated/production.yml
private_key_file = ~/.ssh/ansible_key
vault_password_file = ~/.ansible/vault_pass.txt
roles_path = ./roles
