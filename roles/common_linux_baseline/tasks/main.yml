---
- name: Install rfkill
  ansible.builtin.package:
    name: rfkill
    state: present

- name: Ensure systemd-logind drop-in directory exists
  ansible.builtin.file:
    path: /etc/systemd/logind.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Disable idle-triggered sleep in systemd-logind
  ansible.builtin.template:
    src: logind-idle-action.conf.j2
    dest: /etc/systemd/logind.conf.d/80-ansible-idle-action.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart systemd-logind

- name: Ensure sleep-related systemd targets are not masked
  ansible.builtin.systemd:
    name: "{{ item }}"
    masked: false
  loop:
    - sleep.target
    - suspend.target
    - hibernate.target
    - hybrid-sleep.target

- name: Install rfkill enforcement systemd unit
  ansible.builtin.template:
    src: rfkill-block.service.j2
    dest: /etc/systemd/system/ansible-rfkill-block.service
    owner: root
    group: root
    mode: "0644"

- name: Enable and start rfkill enforcement service
  ansible.builtin.systemd:
    name: ansible-rfkill-block.service
    daemon_reload: true
    enabled: true
    state: started
