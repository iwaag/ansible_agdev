---
- name: Install laptop power management packages
  ansible.builtin.package:
    name:
      - tlp
      - tlp-rdw
    state: present

- name: Check current systemd default target
  ansible.builtin.command: systemctl get-default
  register: laptop_power_profile_default_target
  changed_when: false

- name: Set systemd default target to multi-user.target
  ansible.builtin.command: systemctl set-default multi-user.target
  when: laptop_power_profile_default_target.stdout != "multi-user.target"

- name: Ensure tlp service is enabled and started
  ansible.builtin.systemd:
    name: tlp.service
    enabled: true
    state: started

- name: Ensure systemd-logind drop-in directory exists
  ansible.builtin.file:
    path: /etc/systemd/logind.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Configure lid switch handling
  ansible.builtin.template:
    src: logind-lid-switch.conf.j2
    dest: /etc/systemd/logind.conf.d/80-ansible-lid-switch.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart systemd-logind

- name: Install mem sleep default systemd unit
  ansible.builtin.template:
    src: mem-sleep-default.service.j2
    dest: /etc/systemd/system/ansible-mem-sleep-default.service
    owner: root
    group: root
    mode: "0644"

- name: Enable and start mem sleep default service
  ansible.builtin.systemd:
    name: ansible-mem-sleep-default.service
    daemon_reload: true
    enabled: true
    state: started

- name: Ensure getty override directory exists
  ansible.builtin.file:
    path: /etc/systemd/system/getty@tty1.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Install getty console blanking override
  ansible.builtin.template:
    src: getty-setterm-blank.conf.j2
    dest: /etc/systemd/system/getty@tty1.service.d/10-ansible-setterm-blank.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload and restart getty tty1
