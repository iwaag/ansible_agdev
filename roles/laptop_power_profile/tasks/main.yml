---
- name: Install laptop power management packages
  ansible.builtin.package:
    name:
      - tlp
      - tlp-rdw
    state: present

- name: Ensure tlp service is enabled and started
  ansible.builtin.systemd:
    name: tlp.service
    enabled: true
    state: started

- name: Configure GRUB console blanking timeout
  ansible.builtin.replace:
    path: /etc/default/grub
    regexp: '^(GRUB_CMDLINE_LINUX_DEFAULT=")(?!.*\bconsoleblank=60\b)([^"]*)"'
    replace: '\1\2 consoleblank=60"'
  notify: Update grub

- name: Apply runtime console blanking timeout
  ansible.builtin.shell: echo 60 > /sys/module/kernel/parameters/consoleblank
  args:
    executable: /bin/bash
  register: runtime_consoleblank_apply
  changed_when: false
  failed_when: false

- name: Ensure systemd-logind drop-in directory exists
  ansible.builtin.file:
    path: /etc/systemd/logind.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Configure lid switch handling
  ansible.builtin.template:
    src: logind-lid-switch.conf.j2
    dest: /etc/systemd/logind.conf.d/80-ansible-lid-switch.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart systemd-logind

- name: Install mem sleep default systemd unit
  ansible.builtin.template:
    src: mem-sleep-default.service.j2
    dest: /etc/systemd/system/ansible-mem-sleep-default.service
    owner: root
    group: root
    mode: "0644"

- name: Enable and start mem sleep default service
  ansible.builtin.systemd:
    name: ansible-mem-sleep-default.service
    daemon_reload: true
    enabled: true
    state: started

- name: Install console blanking systemd unit
  ansible.builtin.template:
    src: setterm-blank.service.j2
    dest: /etc/systemd/system/ansible-setterm-blank.service
    owner: root
    group: root
    mode: "0644"

- name: Enable and start console blanking service
  ansible.builtin.systemd:
    name: ansible-setterm-blank.service
    daemon_reload: true
    enabled: true
    state: started

- name: Install console blanking profile script
  ansible.builtin.template:
    src: setterm-blank.sh.j2
    dest: /etc/profile.d/ansible-setterm-blank.sh
    owner: root
    group: root
    mode: "0644"
