---
- name: Ensure default_user is defined
  ansible.builtin.assert:
    that:
      - default_user is defined
      - default_user | length > 0
    fail_msg: "default_user must be defined, for example from Ansible Vault."

- name: Ensure ansible architecture is supported for Prometheus
  ansible.builtin.assert:
    that:
      - prometheus_go_arch | length > 0
    fail_msg: "Unsupported architecture for Prometheus: {{ ansible_architecture }}"

- name: Set Prometheus archive paths
  ansible.builtin.set_fact:
    prometheus_archive_name: "prometheus-{{ prometheus_version }}.linux-{{ prometheus_go_arch }}"
    prometheus_archive_path: "{{ prometheus_tmp_dir }}/prometheus-{{ prometheus_version }}.linux-{{ prometheus_go_arch }}.tar.gz"
    prometheus_extract_path: "{{ prometheus_tmp_dir }}/prometheus-{{ prometheus_version }}.linux-{{ prometheus_go_arch }}"

- name: Look up Prometheus runtime group
  ansible.builtin.command: "id -gn {{ prometheus_system_user }}"
  register: prometheus_runtime_group
  changed_when: false

- name: Set Prometheus runtime group
  ansible.builtin.set_fact:
    prometheus_system_group: "{{ prometheus_runtime_group.stdout }}"

- name: Ensure Prometheus directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ prometheus_config_dir }}"
      owner: root
      group: root
      mode: "0755"
    - path: "{{ prometheus_data_dir }}"
      owner: "{{ prometheus_system_user }}"
      group: "{{ prometheus_system_group }}"
      mode: "0755"

- name: Download Prometheus release archive
  ansible.builtin.get_url:
    url: "https://github.com/prometheus/prometheus/releases/download/v{{ prometheus_version }}/{{ prometheus_archive_name }}.tar.gz"
    dest: "{{ prometheus_archive_path }}"
    mode: "0644"

- name: Extract Prometheus release archive
  ansible.builtin.unarchive:
    src: "{{ prometheus_archive_path }}"
    dest: "{{ prometheus_tmp_dir }}"
    remote_src: true
    creates: "{{ prometheus_extract_path }}"

- name: Install Prometheus binaries
  ansible.builtin.copy:
    src: "{{ prometheus_extract_path }}/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    remote_src: true
    owner: root
    group: root
    mode: "0755"
  loop:
    - prometheus
    - promtool
  notify: Restart Prometheus

- name: Install Prometheus console assets
  ansible.builtin.copy:
    src: "{{ prometheus_extract_path }}/{{ item }}"
    dest: "{{ prometheus_config_dir }}/"
    remote_src: true
    owner: root
    group: root
    mode: preserve
  loop:
    - consoles
    - console_libraries
  notify: Restart Prometheus

- name: Install Prometheus configuration
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: "{{ prometheus_config_dir }}/prometheus.yml"
    owner: root
    group: root
    mode: "0644"
  notify: Restart Prometheus

- name: Install Prometheus systemd unit
  ansible.builtin.template:
    src: prometheus.service.j2
    dest: /etc/systemd/system/prometheus.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart Prometheus

- name: Ensure Prometheus service is enabled and started
  ansible.builtin.systemd:
    name: prometheus.service
    enabled: true
    state: started
