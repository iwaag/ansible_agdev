---
- name: Install unattended-upgrades and needrestart
  ansible.builtin.package:
    name:
      - unattended-upgrades
      - needrestart
    state: present

- name: Enable apt periodic unattended upgrades
  ansible.builtin.template:
    src: 20auto-upgrades.j2
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: "0644"

- name: Install unattended-upgrades settings
  ansible.builtin.template:
    src: 52ansible-unattended-upgrades.j2
    dest: /etc/apt/apt.conf.d/52ansible-unattended-upgrades
    owner: root
    group: root
    mode: "0644"

- name: Configure needrestart to avoid automatic service restarts
  ansible.builtin.template:
    src: 90-ansible-needrestart.conf.j2
    dest: /etc/needrestart/conf.d/90-ansible.conf
    owner: root
    group: root
    mode: "0644"
